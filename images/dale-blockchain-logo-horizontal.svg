<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4640 700" aria-labelledby="title desc">
  <title>DALE Blockchain horizontal logo</title>
  <desc id="desc">Circular kamon-inspired blockchain network emblem with the DALE BLOCKCHAIN wordmark on one line to its right.</desc>
  <defs>
    <path id="branch" d="M330 130 C330 121 337 115 350 113 C363 115 370 121 370 130 L370 264 C370 272 365 277 358 281 L350 286 L342 281 C335 277 330 272 330 264 Z"/>
    <path id="outerBlock" d="M320 90 C336 86 364 86 380 90 C388 92 392 97 392 105 L392 190 C392 198 388 203 381 207 L350 225 L319 207 C312 203 308 198 308 190 L308 105 C308 97 312 92 320 90 Z"/>
  </defs>

  
  <g id="emblem">
    <circle cx="350" cy="350" r="322" fill="#000000"/>
    <circle cx="350" cy="350" r="284" fill="none" stroke="#FFFFFF" stroke-width="24"/>
    <circle cx="350" cy="350" r="235" fill="none" stroke="#FFFFFF" stroke-width="2"/>

    <g stroke="#FFFFFF" stroke-width="2" fill="none">
      <circle cx="350" cy="350" r="174"/>
      <circle cx="350" cy="350" r="96"/>
    </g>

    <g fill="#FFFFFF">
      <use href="#branch"/>
      <use href="#branch" transform="rotate(60 350 350)"/>
      <use href="#branch" transform="rotate(120 350 350)"/>
      <use href="#branch" transform="rotate(180 350 350)"/>
      <use href="#branch" transform="rotate(240 350 350)"/>
      <use href="#branch" transform="rotate(300 350 350)"/>
    </g>

    <g>
      <path d="M350 123 L350 278" stroke="#000000" stroke-width="18" stroke-linecap="round"/>
      <path d="M350 123 L350 278" stroke="#000000" stroke-width="18" stroke-linecap="round" transform="rotate(60 350 350)"/>
      <path d="M350 123 L350 278" stroke="#000000" stroke-width="18" stroke-linecap="round" transform="rotate(120 350 350)"/>
      <path d="M350 123 L350 278" stroke="#000000" stroke-width="18" stroke-linecap="round" transform="rotate(180 350 350)"/>
      <path d="M350 123 L350 278" stroke="#000000" stroke-width="18" stroke-linecap="round" transform="rotate(240 350 350)"/>
      <path d="M350 123 L350 278" stroke="#000000" stroke-width="18" stroke-linecap="round" transform="rotate(300 350 350)"/>
    </g>

    <g fill="#FFFFFF">
      <use href="#outerBlock"/>
      <use href="#outerBlock" transform="rotate(60 350 350)"/>
      <use href="#outerBlock" transform="rotate(120 350 350)"/>
      <use href="#outerBlock" transform="rotate(180 350 350)"/>
      <use href="#outerBlock" transform="rotate(240 350 350)"/>
      <use href="#outerBlock" transform="rotate(300 350 350)"/>
    </g>

    <g stroke="#000000" stroke-width="18" stroke-linecap="round">
      <line x1="350" y1="115" x2="350" y2="222"/>
      <line x1="350" y1="115" x2="350" y2="222" transform="rotate(60 350 350)"/>
      <line x1="350" y1="115" x2="350" y2="222" transform="rotate(120 350 350)"/>
      <line x1="350" y1="115" x2="350" y2="222" transform="rotate(180 350 350)"/>
      <line x1="350" y1="115" x2="350" y2="222" transform="rotate(240 350 350)"/>
      <line x1="350" y1="115" x2="350" y2="222" transform="rotate(300 350 350)"/>
    </g>

    <g stroke="#FFFFFF" stroke-width="8" stroke-linecap="round">
      <line x1="350" y1="350" x2="350" y2="194"/>
      <line x1="350" y1="350" x2="350" y2="194" transform="rotate(60 350 350)"/>
      <line x1="350" y1="350" x2="350" y2="194" transform="rotate(120 350 350)"/>
      <line x1="350" y1="350" x2="350" y2="194" transform="rotate(180 350 350)"/>
      <line x1="350" y1="350" x2="350" y2="194" transform="rotate(240 350 350)"/>
      <line x1="350" y1="350" x2="350" y2="194" transform="rotate(300 350 350)"/>
    </g>

    <polygon points="350,265 424,307 424,393 350,435 276,393 276,307" fill="#000000" stroke="#FFFFFF" stroke-width="14"/>
    <polygon points="350,302 392,326 392,374 350,398 308,374 308,326" fill="none" stroke="#FFFFFF" stroke-width="7"/>
    <circle cx="350" cy="350" r="21" fill="#FFFFFF"/>

    <g fill="#000000" stroke="#FFFFFF" stroke-width="10">
      <circle cx="350" cy="194" r="18"/>
      <circle cx="350" cy="194" r="18" transform="rotate(60 350 350)"/>
      <circle cx="350" cy="194" r="18" transform="rotate(120 350 350)"/>
      <circle cx="350" cy="194" r="18" transform="rotate(180 350 350)"/>
      <circle cx="350" cy="194" r="18" transform="rotate(240 350 350)"/>
      <circle cx="350" cy="194" r="18" transform="rotate(300 350 350)"/>
    </g>

    <circle cx="350" cy="350" r="315" fill="none" stroke="#FFFFFF" stroke-width="10"/>
