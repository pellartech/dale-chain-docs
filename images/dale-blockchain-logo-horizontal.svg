  <text x="800" y="499" fill="#000000" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="700" font-size="417" letter-spacing="-4">DALE <tspan dx="55">BLOCKCHAIN</tspan></text>
</svg>
